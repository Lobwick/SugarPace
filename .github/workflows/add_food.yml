name: Add food from issue

on:
  issues:
    types: [opened, edited, reopened]

jobs:
  add-food:
    if: startsWith(github.event.issue.title, 'add-food:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install Pillow requests

      - name: Parse title and compute slug
        env:
          TITLE: ${{ github.event.issue.title }}
        run: |
          # Strip "add-food: " prefix then split on " - "
          REST="${TITLE#add-food: }"
          BRAND="${REST%% - *}"
          NAME="${REST#* - }"
          echo "BRAND=$BRAND" >> "$GITHUB_ENV"
          echo "NAME=$NAME"   >> "$GITHUB_ENV"
          BRAND_SLUG=$(echo "$BRAND" | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | tr -cd 'a-z0-9_')
          NAME_SLUG=$(echo "$NAME"   | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | tr -cd 'a-z0-9_')
          SLUG="${BRAND_SLUG}_${NAME_SLUG}"
          echo "SLUG=$SLUG"   >> "$GITHUB_ENV"
          echo "BRANCH=add-food/$SLUG" >> "$GITHUB_ENV"

      - name: Save issue body to file
        env:
          BODY: ${{ github.event.issue.body }}
        run: printf '%s' "$BODY" > /tmp/issue_body.txt

      - name: Run add_food.py
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 scripts/add_food.py \
            --from-issue-body /tmp/issue_body.txt \
            --brand "$BRAND" \
            --name "$NAME"

      - name: Commit and push
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add resources/foods/foods.json \
                  resources/drawables/drawables.xml \
                  source/DrawableRegistry.mc \
                  resources/drawables/brands/
          git commit -m "feat: add food $SLUG (closes #$ISSUE_NUMBER)"
          git push --force origin "$BRANCH"
          gh pr create \
            --title "feat: add food $SLUG" \
            --base main \
            --head "$BRANCH" \
            --body "Closes #$ISSUE_NUMBER"
