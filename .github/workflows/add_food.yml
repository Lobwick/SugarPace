name: Add food from issue

on:
  issues:
    types: [opened, edited, reopened]

jobs:
  add-food:
    if: startsWith(github.event.issue.title, 'add-food:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install Pillow

      - name: Parse brand and name from issue title
        id: title
        env:
          TITLE: ${{ github.event.issue.title }}
        run: |
          python3 - <<'PY'
          import os, re
          title = os.environ["TITLE"]
          # "add-food: Brand - Product Name"
          m = re.match(r"add-food:\s*(.+?)\s*-\s*(.+)", title)
          if not m:
              print("ERROR: titre invalide. Format attendu: add-food: Marque - Nom du produit")
              exit(1)
          brand = m.group(1).strip()
          name  = m.group(2).strip()
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"brand={brand}\n")
              f.write(f"name={name}\n")
          print(f"brand={brand}  name={name}")
          PY

      - name: Write issue body to file
        env:
          BODY: ${{ github.event.issue.body }}
        run: echo "$BODY" > /tmp/issue_body.md

      - name: Run add_food script
        env:
          BRAND: ${{ steps.title.outputs.brand }}
          NAME:  ${{ steps.title.outputs.name }}
        run: |
          python3 scripts/add_food.py \
            --from-issue-body /tmp/issue_body.md \
            --brand "$BRAND" \
            --name  "$NAME"

      - name: Validate catalogue consistency
        run: python3 scripts/validate_foods.py

      - name: Create branch and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BRAND: ${{ steps.title.outputs.brand }}
          NAME:  ${{ steps.title.outputs.name }}
        run: |
          SLUG=$(python3 - <<'PY'
import os
brand = os.environ['BRAND'].strip().lower().replace(' ', '_')
name  = os.environ['NAME'].strip().lower().replace(' ', '_')
print(f'{brand}_{name}')
PY
          )
          BRANCH="add-food/$SLUG"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add resources/foods/foods.json \
                  resources/drawables/drawables.xml \
                  source/DrawableRegistry.mc \
                  resources/drawables/brands/
          git commit -m "feat: add food $SLUG (closes #$ISSUE_NUMBER)"
          git push origin "$BRANCH"
          gh pr create \
            --title "feat: add food $SLUG" \
            --body "Closes #$ISSUE_NUMBER
