name: Ajouter un aliment
description: Propose un nouvel aliment au catalogue SugarPace. Une PR sera créée automatiquement.
title: "add-food: Marque - Nom du produit"
labels: ["add-food"]
body:
  - type: dropdown
    id: subcategory
    attributes:
      label: Catégorie
      options:
        - GEL
        - JELLIES
        - BAR
        - OTHER
    validations:
      required: true

  - type: input
    id: portion_g
    attributes:
      label: Portion (g)
      placeholder: "40"
    validations:
      required: true

  - type: input
    id: carbs_g
    attributes:
      label: Glucides pour la portion (g)
      placeholder: "26"
    validations:
      required: true

  - type: input
    id: fat_g
    attributes:
      label: Lipides pour la portion (g)
      placeholder: "0"
    validations:
      required: true

  - type: input
    id: protein_g
    attributes:
      label: Protéines pour la portion (g)
      placeholder: "0"
    validations:
      required: true

  - type: input
    id: energy_kj
    attributes:
      label: Énergie pour la portion (kJ)
      placeholder: "440"
    validations:
      required: true

  - type: textarea
    id: image_url
    attributes:
      label: Image du produit
      description: >
        Glisser-déposer l'image directement dans ce champ — GitHub l'uploade
        automatiquement et insère le lien. L'image sera redimensionnée à 150×150 px.
    validations:
      required: true
